services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartcommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes: [smartcommerce-db:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartcommerce"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build: ./backend
    env_file: ./backend/.env
    ports: ["8000:8000"]
    depends_on:
      db: {condition: service_healthy}
  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    env_file: ./backend/.env
    ports: ["8001:8001"]
    depends_on:
      db: {condition: service_healthy}
  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [backend]
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: [ollama-data:/root/.ollama]
volumes:
  smartcommerce-db:
  ollama-data:

